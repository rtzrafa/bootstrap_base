<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container mt-3">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exemploModal">
            Abrir Modal
       
        </button>
     
        <div class="modal fade" id="exemploModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <!-- header -->
                     <div class="modal-header">
                        <h5 class="modal-title">Titulo do Modal</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="moal"></button>
                     </div>

                     <!-- Body -->
                      <div class="modal-body">
                        <p>Conteudo do Modal aqui.</p>
                      </div>

                      <!-- footer -->
                       <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary">Salvar</button>
                       </div>

                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
