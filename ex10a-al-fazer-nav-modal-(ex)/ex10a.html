<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário com Modal</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Meu Site</span>

    <!-- Botão Contato -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#contatoModal">
      Contato
    </button>
  </div>
</nav>

<!-- MODAL -->
<div class="modal fade" id="contatoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Cabeçalho -->
      <div class="modal-header">
        <h5 class="modal-title">Fale Conosco</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Corpo -->
      <div class="modal-body">
        <form class="needs-validation" novalidate>

          <!-- Nome -->
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">
              Por favor, insira seu nome.
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" required>
            <div class="invalid-feedback">
              Insira um e-mail válido.
            </div>
          </div>

          <!-- Mensagem -->
          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea class="form-control" rows="3" required></textarea>
            <div class="invalid-feedback">
              Escreva uma mensagem.
            </div>
          </div>

          <!-- Botão -->
          <button class="btn btn-success w-100" type="submit">
            Enviar
          </button>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validação -->
<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})();
</script>

</body>
</html>
