<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
     <link rel="stylesheet" href="style.css">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
   

</head>
<body>

    <!-- 1ª Digitação (Aqui) -->
     <div class="container d-flex justifu-content-center mt-3">
     <button class="btn btn-primary ms-2">primário</button>
     <button class="btn btn-secondary ms-2">segundario</button>
     <button class="btn btn-success ms-2">sucesso</button>
     <button class="btn btn-danger ms-2">perigo</button>
     <button class="btn btn-warning ms-2">alerta</button>
     <button class="btn btn-info ms-2">info</button>
     </div>

     
<div class="container d-flex justifu-content-center mt-5">
        <!-- Botão com icone -->
         <button class="btn btn-primary">
            <i class="bi bi-search"></i> pesquisar
         </button>

         <!-- botão com icone -->
        <button class="btn btn-primary">
            <i class="bi bi-trash"></i>  
     </button>
     
        </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
