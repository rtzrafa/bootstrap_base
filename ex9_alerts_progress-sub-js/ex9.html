<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts e Progress Bar Bootstrap Interativos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
    <section class="container mt-3">

       <!-- Botões para controlar os alertas -->

         <div class="mb -3">
            <button id="showSuccessBtn" class="btn btn-success me-2">Mostrar Sucesso</button>
            <button id="showErrorBtn" class="btn btn-danger me-2">Mostrar Erro</button>
            <button id="showToastBtn" class="btn btn-warning">Mostrar Toast</button>
         </div>

         <!-- Alerta de Sucesso -->

         <div class="alert alert-success alert-dismissible fade" id="successAlert">
            <strong>Sucesso!</strong> Operação realizada com sucesso!
            <button type="button" class="btn-close" data-bs-dismissible="alert"></button>
         </div>

         <!-- Alerta de Erro -->

         <div class="alert alert-danger alert-dismissible fade" id="errorAlert">
           <strong>Erro!</strong> Erro ao processar a operação!
           <button type="button" class="btn-close" data-bs-dismissible="alert"></button>
         </div>

         <!-- Toast Notification-->

          <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11;">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
              <div class="toast-header">
                <strong class="me-auto">Notificação</strong>
                <small>Agora</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
              </div>
              <div class="toast-body">
                Esta é uma mensagem de toast!
              </div>
            </div>
            </div>

            <!-- Progressbar -->

            <h5 class="mt-4">Progresso</h5>
            <div class="progress mb-3">
                <div class="progress-bar progress-bar-striped progress-bar-animated" id="dynamicProgress" 
                role="progressbar" style="width: 0%;"> 0%
                    
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="decreaseBtn">-10%</button>
                <button class="btn btn-secondary" id="increaseBtn">+10%</button>
            </div>
            <button class="btn btn-success ms-2" id="toggleAnimationBtn" >
                Toggle Animação
            </button>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="teste.js"></script>
</body>
</html>
